<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  width="128"
  height="128"
  fill="none"
  role="img"
  aria-label="Elections"
>
  <defs>
    <linearGradient id="arcPurple" x1="21" y1="16" x2="59" y2="111" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#6D45F5"/>
    </linearGradient>

    <linearGradient id="arcGreen" x1="49" y1="109" x2="104" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#56D86B"/>
      <stop offset="1" stop-color="#36C878"/>
    </linearGradient>

    <linearGradient id="boxFill" x1="36" y1="69" x2="92" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08B5C4"/>
      <stop offset="1" stop-color="#0799B1"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#05202A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- purple arc -->
    <path
      d="M28.3 94.4A46.4 46.4 0 0 1 23.5 44.3A46.4 46.4 0 0 1 83.7 22.4"
      stroke="url(#arcPurple)"
      stroke-width="13.9"
      stroke-linecap="round"
    />

    <!-- green arc -->
    <path
      d="M43.2 103.5A46.4 46.4 0 0 0 100.8 89.1A46.4 46.4 0 0 0 97.6 38.4"
      stroke="url(#arcGreen)"
      stroke-width="13.9"
      stroke-linecap="round"
    />

    <!-- rear lip of box -->
    <path
      d="M40.5 70.4L45.9 60.8H82.1L87.5 70.4Z"
      fill="#078B9B"
    />

    <!-- ballot paper, partly inserted -->
    <rect
      x="43.7"
      y="37.9"
      width="40.5"
      height="41.6"
      rx="6.4"
      fill="#FFFFFF"
    />

    <!-- ballot details -->
    <path
      d="M53.9 48.5H74.1"
      stroke="#B7C9D0"
      stroke-width="4.3"
      stroke-linecap="round"
    />

    <path
      d="M52.8 60.3L60.3 67.7L76.8 51.2"
      stroke="#078AC0"
      stroke-width="7.7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- box front covers bottom of ballot -->
    <rect
      x="35.7"
      y="69.3"
      width="56.5"
      height="24.5"
      rx="7.5"
      fill="url(#boxFill)"
    />
  </g>
</svg>